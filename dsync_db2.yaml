driver: db2
connectionstring: "db2://DB2INST1:mypassword@myip:50000/mydb"
mappings:
  - namespace: Accounts
    countquery: "select count(1) from ACCOUNTS"
    partitionquery: "select ACCOUNT_ID as ID from ACCOUNTS TABLESAMPLE BERNOULLI (0.05)"
    query: |
      SELECT 
          a.ACCOUNT_ID AS ID, 
          a.ACCOUNT_NAME, 
        CAST(JSON_OBJECT(KEY 'AGENT_ID' VALUE ag.AGENT_ID, 
                         KEY 'NAME' VALUE ag.FIRST_NAME) 
             AS VARCHAR(2000)) AS "Agent",
        CAST(COALESCE('[' || LISTAGG(
            JSON_OBJECT(KEY 'CUSTOMER_ID' VALUE c.CUSTOMER_ID, 
                        KEY 'NAME' VALUE c.FIRST_NAME), 
            ','
        ) || ']', '[]') AS VARCHAR(32000)) AS "Customers"
      FROM ACCOUNTS a
      LEFT JOIN AGENTS ag ON ag.AGENT_ID = a.AGENT_ID
      LEFT JOIN CUSTOMERS c ON c.ACCOUNT_ID = a.ACCOUNT_ID
      GROUP BY 
          a.ACCOUNT_ID, 
          a.ACCOUNT_NAME, 
          ag.AGENT_ID, 
          ag.FIRST_NAME
    limit: 100
    cols: ["ID"]
    decodejson: ["Agent", "Customers"]
    changes:
      - query: "select ACCOUNT_ID AS ID, IBMSNAP_OPERATION AS SYS_CHANGE_OPERATION, IBMSNAP_COMMITSEQ from ASNCDC.CDC_DB2INST1_ACCOUNTS where IBMSNAP_COMMITSEQ > ?"
        initialcursorquery: "SELECT max(SYNCHPOINT) FROM (SELECT CD_NEW_SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER UNION ALL SELECT SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER)"
      - query: "select a.ACCOUNT_ID AS ID, 'U' AS SYS_CHANGE_OPERATION, ag.IBMSNAP_COMMITSEQ from ASNCDC.CDC_DB2INST1_AGENTS ag join ACCOUNTS a on a.AGENT_ID = ag.AGENT_ID where ag.IBMSNAP_COMMITSEQ > ?"
        initialcursorquery: "SELECT max(SYNCHPOINT) FROM (SELECT CD_NEW_SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER UNION ALL SELECT SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER)"
      - query: "select c.ACCOUNT_ID AS ID, 'U' AS SYS_CHANGE_OPERATION, c.IBMSNAP_COMMITSEQ from ASNCDC.CDC_DB2INST1_CUSTOMERS c where c.IBMSNAP_COMMITSEQ > ?"
        initialcursorquery: "SELECT max(SYNCHPOINT) FROM (SELECT CD_NEW_SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER UNION ALL SELECT SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER)"

  - namespace: Policies
    countquery: "select count(1) from POLICIES"
    partitionquery: "select POLICY_ID as ID from POLICIES TABLESAMPLE BERNOULLI (0.05)"
    query: |
      SELECT 
          p.POLICY_ID AS ID, 
          p.POLICY_TYPE, 
          p.START_DATE, 
          p.END_DATE, 
          p.PREMIUM_AMOUNT, 
          p.COVERAGE_AMOUNT, 
          p.STATUS,
          CAST(JSON_OBJECT(KEY 'CUSTOMER_ID' VALUE c.CUSTOMER_ID, 
                           KEY 'FIRST_NAME' VALUE c.FIRST_NAME, 
                           KEY 'LAST_NAME' VALUE c.LAST_NAME, 
                           KEY 'EMAIL' VALUE c.EMAIL) AS VARCHAR(2000)) AS "Customer",
          CAST(JSON_OBJECT(KEY 'AGENT_ID' VALUE ag.AGENT_ID, 
                           KEY 'FIRST_NAME' VALUE ag.FIRST_NAME, 
                           KEY 'LAST_NAME' VALUE ag.LAST_NAME) AS VARCHAR(2000)) AS "Agent",
          CAST(COALESCE('[' || (SELECT LISTAGG(
              JSON_OBJECT(KEY 'CLAIM_ID' VALUE cl.CLAIM_ID, 
                          KEY 'CLAIM_DATE' VALUE cl.CLAIM_DATE, 
                          KEY 'INCIDENT_DATE' VALUE cl.INCIDENT_DATE, 
                          KEY 'CLAIM_AMOUNT' VALUE cl.CLAIM_AMOUNT, 
                          KEY 'STATUS' VALUE cl.STATUS, 
                          KEY 'DESCRIPTION' VALUE cl.DESCRIPTION), ',') 
              FROM CLAIMS cl WHERE cl.POLICY_ID = p.POLICY_ID) || ']', '[]') AS VARCHAR(32000)) AS "Claims",
          CAST(COALESCE('[' || (SELECT LISTAGG(
              JSON_OBJECT(KEY 'TRANSACTION_ID' VALUE t.TRANSACTION_ID, 
                          KEY 'TRANSACTION_DATE' VALUE t.TRANSACTION_DATE, 
                          KEY 'AMOUNT' VALUE t.AMOUNT, 
                          KEY 'TRANSACTION_TYPE' VALUE t.TRANSACTION_TYPE, 
                          KEY 'DESCRIPTION' VALUE t.DESCRIPTION), ',') 
              FROM TRANSACTIONS t WHERE t.POLICY_ID = p.POLICY_ID) || ']', '[]') AS VARCHAR(32000)) AS "Transactions"
      FROM POLICIES p
      LEFT JOIN CUSTOMERS c ON c.CUSTOMER_ID = p.CUSTOMER_ID
      LEFT JOIN AGENTS ag ON ag.AGENT_ID = p.AGENT_ID
    limit: 100
    cols: ["ID"]
    decodejson: ["Customer", "Agent", "Claims", "Transactions"]
    changes:
      - query: "select POLICY_ID AS ID, IBMSNAP_OPERATION AS SYS_CHANGE_OPERATION, IBMSNAP_COMMITSEQ from ASNCDC.CDC_DB2INST1_POLICIES where IBMSNAP_COMMITSEQ > ?"
        initialcursorquery: "SELECT max(SYNCHPOINT) FROM (SELECT CD_NEW_SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER UNION ALL SELECT SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER)"
      - query: "select p.POLICY_ID AS ID, 'U' AS SYS_CHANGE_OPERATION, c.IBMSNAP_COMMITSEQ from ASNCDC.CDC_DB2INST1_CUSTOMERS c join POLICIES p on p.CUSTOMER_ID = c.CUSTOMER_ID where c.IBMSNAP_COMMITSEQ > ?"
        initialcursorquery: "SELECT max(SYNCHPOINT) FROM (SELECT CD_NEW_SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER UNION ALL SELECT SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER)"
      - query: "select p.POLICY_ID AS ID, 'U' AS SYS_CHANGE_OPERATION, ag.IBMSNAP_COMMITSEQ from ASNCDC.CDC_DB2INST1_AGENTS ag join POLICIES p on p.AGENT_ID = ag.AGENT_ID where ag.IBMSNAP_COMMITSEQ > ?"
        initialcursorquery: "SELECT max(SYNCHPOINT) FROM (SELECT CD_NEW_SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER UNION ALL SELECT SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER)"
      - query: "select cl.POLICY_ID AS ID, 'U' AS SYS_CHANGE_OPERATION, cl.IBMSNAP_COMMITSEQ from ASNCDC.CDC_DB2INST1_CLAIMS cl where cl.IBMSNAP_COMMITSEQ > ?"
        initialcursorquery: "SELECT max(SYNCHPOINT) FROM (SELECT CD_NEW_SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER UNION ALL SELECT SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER)"
      - query: "select t.POLICY_ID AS ID, 'U' AS SYS_CHANGE_OPERATION, t.IBMSNAP_COMMITSEQ from ASNCDC.CDC_DB2INST1_TRANSACTIONS t where t.IBMSNAP_COMMITSEQ > ?"
        initialcursorquery: "SELECT max(SYNCHPOINT) FROM (SELECT CD_NEW_SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER UNION ALL SELECT SYNCHPOINT AS SYNCHPOINT FROM ASNCDC.IBMSNAP_REGISTER)"
